<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bill / Receipt Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 50px;
      background: #f9f9f9;
    }
    input, button {
      margin: 10px 0;
      padding: 10px;
      font-size: 16px;
    }
    #status {
      margin-top: 10px;
      font-weight: bold;
      color: green;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    table, th, td {
      border: 1px solid #ccc;
    }
    th, td {
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f4f4f4;
    }
    .totals {
      font-weight: bold;
      background: #eef;
    }
  </style>
</head>
<body>
  <h1>Upload a Bill / Receipt / Cheque</h1>
  <input type="file" id="imageInput" accept="image/*" />
  <button onclick="uploadImage()">Extract & Display</button>

  <div id="status"></div>
  <div id="billContainer"></div>

  <script>
    async function uploadImage() {
      const fileInput = document.getElementById("imageInput");
      const status = document.getElementById("status");
      const container = document.getElementById("billContainer");

      if (!fileInput.files.length) {
        alert("Please select an image!");
        return;
      }

      status.textContent = "Processing image...";
      container.innerHTML = "";

      try {
        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        const response = await fetch("http://localhost:5000/extract", {
  method: "POST",
  body: formData
});

if (!response.ok) throw new Error(`Server error: ${response.status}`);

const data = await response.json();

// FIXED: use object directly, no JSON.parse
const bill = data.extractedData || {};

renderBill(bill);
status.textContent = "Extraction completed!";

      } catch (err) {
        console.error(err);
        status.textContent = "Error extracting data. Check console.";
      }
    }

    function renderBill(bill) {
      const container = document.getElementById("billContainer");

      // Header info
      let html = `<h2>Vendor: ${bill.vendor || "N/A"}</h2>`;
      html += `<p>Date: ${bill.date || "N/A"}</p>`;

      // Items table
      html += `<table>
        <thead>
          <tr>
            <th>Item Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>GST</th>
            <th>CGST</th>
            <th>SGST</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>`;

      let grandTotal = 0;

      if (bill.items && bill.items.length) {
        bill.items.forEach(item => {
          const total = (item.price || 0) * (item.qty || 1);
          grandTotal += total;
          html += `<tr>
            <td>${item.name || ""}</td>
            <td>${item.category || ""}</td>
            <td>${item.qty || 1}</td>
            <td>${item.price || 0}</td>
            <td>${item.gst || 0}</td>
            <td>${item.cgst || 0}</td>
            <td>${item.sgst || 0}</td>
            <td>${total.toFixed(2)}</td>
          </tr>`;
        });
      } else {
        html += `<tr><td colspan="8">No items detected</td></tr>`;
      }

      html += `<tr class="totals">
        <td colspan="7">Grand Total</td>
        <td>${(bill.total || grandTotal).toFixed(2)}</td>
      </tr>`;

      html += `</tbody></table>`;
      container.innerHTML = html;
    }
  </script>
</body>
</html>
